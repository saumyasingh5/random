<!DOCTYPE html>
<html>
<head>
    <title>AI Medical Assistant</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            width: 500px;
            text-align: center;
        }
        h1 {
            color: #667eea;
            margin-bottom: 30px;
        }
        #q {
            width: 90%;
            padding: 15px;
            border: 2px solid #667eea;
            border-radius: 10px;
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 18px;
            cursor: pointer;
        }
        button:hover {
            background: #764ba2;
        }
        #ans {
            margin-top: 30px;
            padding: 20px;
            background: #f0f0f0;
            border-radius: 10px;
            text-align: left;
            min-height: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🩺 AI Medical Assistant</h1>
        <input id="q" placeholder="What are the symptoms of diabetes?">
        <br>
        <button onclick="ask()">Ask AI</button>
        <p id="ans">get answer...</p>
    </div>

    <script>
async function ask() {
    document.getElementById("ans").innerText = "thinking..."
    let question = document.getElementById("q").value
    
    let res = await fetch(`http://localhost:8001/ask`, {  // Port 8001 
        method: 'POST',  // POST
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ question: question })  
    })
    
    let data = await res.json()
    document.getElementById("ans").innerText = data.context  //  show context not answer
}
</script>
</body>
</html>
